# Loki Configuration
# https://grafana.com/docs/loki/latest/configuration/

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 50
  ingestion_burst_size_mb: 100

table_manager:
  retention_deletes_enabled: true
  retention_period: 720h

# Promtail configuration for collecting SecFlow logs
client:
  url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  # SecFlow Server logs
  - job_name: secflow-server
    static_configs:
      - targets:
          - localhost
        labels:
          job: secflow-server
          service: secflow
          component: server
          __path__: /var/log/secflow/server/*.log

  # SecFlow Client logs
  - job_name: secflow-client
    static_configs:
      - targets:
          - localhost
        labels:
          job: secflow-client
          service: secflow
          component: client
          __path__: /var/log/secflow/client/*.log

  # Docker logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: secflow-.*
        target_label: container
