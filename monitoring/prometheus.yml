global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: secflow
    replica: '{{.ExternalURL}}'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      # 如需使用 Alertmanager，取消注释并配置
      # - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # SecFlow Server 应用指标
  - job_name: 'secflow-server'
    static_configs:
      - targets: ['server:9091']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # MongoDB 监控 (使用 mongodb_exporter)
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongo:27017']
    metrics_path: /metrics
    scrape_interval: 30s

  # Redis 监控 (使用 redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: /metrics
    scrape_interval: 30s

  # 客户端节点监控
  - job_name: 'secflow-clients'
    static_configs:
      - targets:
        - 'client-beijing:9091'
        - 'client-shanghai:9091'
        - 'client-guangzhou:9091'
    metrics_path: /metrics
    scrape_interval: 15s
