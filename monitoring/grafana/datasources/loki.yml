# Loki Datasource Configuration
# Add this to your Grafana datasources directory

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      timeout: 60s
    version: 1
