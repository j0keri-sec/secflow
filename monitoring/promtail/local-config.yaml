# Promtail Configuration
# https://grafana.com/docs/loki/latest/send-data/promtail/configuration/

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

client:
  url: http://loki:3100/loki/api/v1/push
  backoff_config:
    max_retries: 5
    min_period: 100ms
    max_period: 30s
  timeout: 10s

scrape_configs:
  # SecFlow Server logs - JSON format
  - job_name: secflow-server
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            ts: ts
            caller: caller
            service: service
      - labels:
          level:
          service:
    static_configs:
      - targets:
          - localhost
        labels:
          job: secflow-server
          service: secflow
          component: server
          __path__: /var/log/secflow/server/*.log

  # SecFlow Client logs - JSON format
  - job_name: secflow-client
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            ts: ts
            caller: caller
      - labels:
          level:
    static_configs:
      - targets:
          - localhost
        labels:
          job: secflow-client
          service: secflow
          component: client
          __path__: /var/log/secflow/client/*.log

  # Nginx access logs
  - job_name: nginx-access
    pipeline_stages:
      - regex:
          expression: '^(?P<ip>\S+) - (?P<user>\S+) \[(?P<timestamp>[^\]]+)\] "(?P<request>[^"]+)" (?P<status>\d+) (?P<size>\d+)'
      - labels:
          status:
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          service: secflow
          component: nginx
          __path__: /var/log/nginx/access.log

  # Nginx error logs
  - job_name: nginx-error
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<msg>.*)'
      - labels:
          level:
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          service: secflow
          component: nginx-error
          __path__: /var/log/nginx/error.log

  # Docker containers
  - job_name:secflow-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: secflow-(server|client|web|mongodb|redis)
        target_label: container
      - source_labels: [__meta_docker_container_label_app]
        target_label: app
