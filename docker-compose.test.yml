# ================================================
# SecFlow 测试环境 Docker 配置
# 使用方式: docker-compose -f docker-compose.test.yml up -d
# ================================================
services:
  # ─────────────────────────────────────────────
  # MongoDB - 测试数据库
  # ─────────────────────────────────────────────
  mongo-test:
    image: mongo:7.0
    container_name: secflow_mongo_test
    environment:
      MONGO_INITDB_ROOT_USERNAME: secflow_test
      MONGO_INITDB_ROOT_PASSWORD: secflow_test_pass
      MONGO_INITDB_DATABASE: secflow_test
    ports:
      - "${MONGO_TEST_PORT:-27018}:27017"
    volumes:
      - mongo_test_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - secflow-test-net

  # ─────────────────────────────────────────────
  # Redis - 测试队列
  # ─────────────────────────────────────────────
  redis-test:
    image: redis:7.2-alpine
    container_name: secflow_redis_test
    command:
      - redis-server
      - --requirepass secflow_test_redis_pass
      - --appendonly yes
      - --maxmemory 256mb
    ports:
      - "${REDIS_TEST_PORT:-6380}:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "secflow_test_redis_pass", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - secflow-test-net

  # ─────────────────────────────────────────────
  # SecFlow Server - 测试版本
  # ─────────────────────────────────────────────
  server-test:
    build:
      context: ./secflow-server
      dockerfile: Dockerfile.test
    image: secflow/server:test
    container_name: secflow_server_test
    depends_on:
      mongo-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    environment:
      SECFLOW_MONGO_URI: "mongodb://secflow_test:secflow_test_pass@mongo-test:27017/secflow_test?authSource=admin"
      SECFLOW_REDIS_URL: "redis://:secflow_test_redis_pass@redis-test:6379/0"
      SECFLOW_JWT_SECRET: "test-jwt-secret-for-testing-only-change-in-prod"
      SECFLOW_PORT: "8080"
      SECFLOW_LOG_LEVEL: "debug"
      SECFLOW_ENV: "test"
    ports:
      - "${SERVER_TEST_PORT:-8081}:8080"
    volumes:
      - server_test_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - secflow-test-net

  # ─────────────────────────────────────────────
  # SecFlow Client - 测试版本
  # ─────────────────────────────────────────────
  client-test:
    build:
      context: ./secflow-client
      dockerfile: Dockerfile.test
    image: secflow/client:test
    container_name: secflow_client_test
    depends_on:
      - server-test
    environment:
      SECFLOW_API_URL: "http://server-test:8080/api/v1"
      SECFLOW_WS_URL: "ws://server-test:8080/api/v1/ws/node"
      SECFLOW_NODE_NAME: "test-node-01"
      SECFLOW_TOKEN_KEY: "test-node-token-key-for-integration-tests"
      SECFLOW_LOG_LEVEL: "debug"
      SECFLOW_MODE: "server"
    volumes:
      - client_test_data:/app/data
      - client_test_logs:/app/logs
    networks:
      - secflow-test-net

  # ─────────────────────────────────────────────
  # Test Runner - 运行测试
  # ─────────────────────────────────────────────
  test-runner:
    image: golang:1.23-alpine
    container_name: secflow_test_runner
    depends_on:
      mongo-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      server-test:
        condition: service_healthy
    environment:
      SECFLOW_MONGO_URI: "mongodb://secflow_test:secflow_test_pass@mongo-test:27017/secflow_test?authSource=admin"
      SECFLOW_REDIS_URL: "redis://:secflow_test_redis_pass@redis-test:6379/0"
      SECFLOW_SERVER_URL: "http://server-test:8080"
    working_dir: /app
    volumes:
      - .:/app
      - go-cache:/go/pkg
    command: >
      sh -c "
        echo 'Waiting for services...' &&
        sleep 10 &&
        echo 'Running tests...' &&
        cd secflow-server && go test -v -count=1 ./tests/... &&
        echo 'Server tests complete!' &&
        cd ../secflow-client && go test -v -count=1 ./tests/... 2>&1 | head -100 ||
        echo 'Client tests completed (some may fail due to network)' &&
        echo 'All tests done!'
      "
    networks:
      - secflow-test-net

  # ─────────────────────────────────────────────
  # Prometheus - 监控测试指标
  # ─────────────────────────────────────────────
  prometheus-test:
    image: prom/prometheus:latest
    container_name: secflow_prometheus_test
    ports:
      - "${PROMETHEUS_TEST_PORT:-9091}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_test_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - secflow-test-net

# ─────────────────────────────────────────────
# 数据卷定义
# ─────────────────────────────────────────────
volumes:
  mongo_test_data:
    driver: local
  redis_test_data:
    driver: local
  server_test_logs:
    driver: local
  client_test_data:
    driver: local
  client_test_logs:
    driver: local
  prometheus_test_data:
    driver: local
  go-cache:
    driver: local

# ─────────────────────────────────────────────
# 网络定义
# ─────────────────────────────────────────────
networks:
  secflow-test-net:
    driver: bridge
    name: secflow_test_network
