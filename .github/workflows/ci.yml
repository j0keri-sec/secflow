name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'

jobs:
  # ================================================
  # Server Tests
  # ================================================
  test-server:
    name: Server Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: |
          cd secflow-server && go mod download

      - name: Run tests
        run: |
          cd secflow-server
          go test -v -count=1 -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: secflow-server/coverage.out

  # ================================================
  # Client Tests
  # ================================================
  test-client:
    name: Client Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: |
          cd secflow-client && go mod download

      - name: Run tests
        run: |
          cd secflow-client
          go test -v -count=1 -race -coverprofile=coverage.out ./... 2>&1 | head -100
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: client-coverage
          path: secflow-client/coverage.out

  # ================================================
  # Web Build
  # ================================================
  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: secflow-web/package-lock.json

      - name: Install dependencies
        run: |
          cd secflow-web && npm ci

      - name: Build
        run: |
          cd secflow-web && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: secflow-web/dist

  # ================================================
  # Docker Build & Test
  # ================================================
  docker-test:
    name: Docker Tests
    runs-on: ubuntu-latest
    needs: [test-server]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker-compose -f docker-compose.test.yml build

      - name: Run Docker test environment
        run: |
          docker-compose -f docker-compose.test.yml up -d

      - name: Wait for services
        run: |
          echo "Waiting for services..."
          sleep 30
          for i in {1..30}; do
            if curl -sf http://localhost:8081/api/v1/health > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting... ($i)"
            sleep 2
          done
          echo "Timeout waiting for server"
          docker-compose -f docker-compose.test.yml logs
          exit 1

      - name: Run integration tests
        run: |
          docker exec secflow_test_runner sh -c "cd /app/secflow-server && go test -v ./tests/integration/..."

      - name: Stop Docker environment
        if: always()
        run: |
          docker-compose -f docker-compose.test.yml down -v

  # ================================================
  # Lint
  # ================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run go vet
        run: |
          cd secflow-server && go vet ./... || true
          cd secflow-client && go vet ./... || true

  # ================================================
  # Security Scan
  # ================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Go vulnerability scan
        run: |
          cd secflow-server && go run golang.org/x/vuln/cmd/govulncheck ./... || true

  # ================================================
  # Summary
  # ================================================
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-server, test-client, build-web]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All tests completed. Check individual job results for details." >> $GITHUB_STEP_SUMMARY
