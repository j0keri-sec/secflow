# ================================================
# SecFlow 生产环境 Docker 配置
# 使用方式: docker-compose -f docker-compose.prod.yml up -d
# ================================================
services:
  # ─────────────────────────────────────────────
  # MongoDB - 主数据库 (生产级配置)
  # ─────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: secflow_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-secflow}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secflow_pass_secure_2026}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-secflow}
    ports:
      - "127.0.0.1:27017:27017"  # 仅本地访问，不暴露公网
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - secflow-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    command: ["-- WiredTiger 存储引擎优化参数 --"]
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ─────────────────────────────────────────────
  # Redis - 任务队列和缓存 (生产级配置)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: secflow_redis
    restart: always
    command:
      - redis-server
      - --requirepass ${REDIS_PASSWORD:-redis_pass_secure_2026}
      - --appendonly yes
      - --appendfsync everysec
      - --maxmemory 1gb
      - --maxmemory-policy allkeys-lru
      - --tcp-keepalive 300
      - --timeout 0
    ports:
      - "127.0.0.1:6379:6379"  # 仅本地访问
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass_secure_2026}", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - secflow-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # Prometheus - 指标收集
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: secflow_prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.max-block-duration=2h'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - secflow-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # Grafana - 监控可视化
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.3
    container_name: secflow_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-admin123}
      - GF_SECURITY_ADMIN_EMAIL=admin@secflow.local
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_URL:-http://localhost:3000}
      - GF_SERVER_DOMAIN=grafana.secflow.local
      # 安全配置
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_XSS_PROTECTION_ENABLED=true
      - GF_SECURITY_CONTENT_TYPE_PROTECTION_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/config.ini:/etc/grafana/grafana.ini:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - secflow-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # SecFlow Server - 后端服务
  # ─────────────────────────────────────────────
  server:
    build:
      context: ./secflow-server
      dockerfile: Dockerfile
    image: secflow/server:${IMAGE_TAG:-latest}
    container_name: secflow_server
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # MongoDB 连接
      SECFLOW_MONGO_URI: "mongodb://${MONGO_ROOT_USER:-secflow}:${MONGO_ROOT_PASS:-secflow_pass_secure_2026}@mongo:27017/${MONGO_DATABASE:-secflow}?authSource=admin&maxPoolSize=50&minPoolSize=10"
      # Redis 连接
      SECFLOW_REDIS_URL: "redis://:${REDIS_PASSWORD:-redis_pass_secure_2026}@redis:6379/0"
      # JWT 配置
      SECFLOW_JWT_SECRET: "${JWT_SECRET}"
      # 服务端口
      SECFLOW_PORT: "8080"
      SECFLOW_METRICS_PORT: "9091"
      # 运行模式
      SECFLOW_ENV: "${SECFLOW_ENV:-production}"
      SECFLOW_LOG_LEVEL: "${SECFLOW_LOG_LEVEL:-info}"
      # 推送配置
      SECFLOW_DINGTALK_WEBHOOK: "${DINGTALK_WEBHOOK:-}"
      SECFLOW_FEISHU_WEBHOOK: "${FEISHU_WEBHOOK:-}"
      # 数据保留
      SECFLOW_RETENTION_DAYS: "${DATA_RETENTION_DAYS:-90}"
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:9091:9091"
    volumes:
      - server_logs:/app/logs
      - server_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - secflow-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ─────────────────────────────────────────────
  # SecFlow Web - 前端界面 (Nginx)
  # ─────────────────────────────────────────────
  web:
    build:
      context: ./secflow-web
      dockerfile: Dockerfile
    image: secflow/web:${IMAGE_TAG:-latest}
    container_name: secflow_web
    restart: always
    depends_on:
      - server
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
      - "${WEB_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - web_cache:/var/cache/nginx
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - secflow-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─────────────────────────────────────────────
  # SecFlow Client - 漏洞爬取节点 (可多地域部署)
  # ─────────────────────────────────────────────
  client-beijing:
    build:
      context: ./secflow-client
      dockerfile: Dockerfile
    image: secflow/client:${IMAGE_TAG:-latest}
    container_name: secflow_client_beijing
    restart: always
    depends_on:
      server:
        condition: service_healthy
    environment:
      # 服务连接地址 (使用内部网络)
      SECFLOW_API_URL: "http://server:8080/api/v1"
      SECFLOW_WS_URL: "ws://server:8080/api/v1/ws/node"
      # 节点配置
      SECFLOW_NODE_NAME: "client-beijing"
      SECFLOW_NODE_REGION: "北京"
      SECFLOW_TOKEN_KEY: "${NODE_TOKEN_KEY:-your-node-token-key}"
      SECFLOW_NODE_TOKEN: "${CLIENT_TOKEN_BEIJING:-client-beijing-token}"
      # 日志和性能
      SECFLOW_LOG_LEVEL: "${SECFLOW_LOG_LEVEL:-info}"
      SECFLOW_MAX_CONCURRENT: "3"
      # Chromium 配置 (go-rod)
      SECFLOW_CHROME_URL: "chrome://headless"
    volumes:
      - client_beijing_data:/app/data
      - client_beijing_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - secflow-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ─────────────────────────────────────────────
  # Client Node 2 (上海)
  # ─────────────────────────────────────────────
  client-shanghai:
    build:
      context: ./secflow-client
      dockerfile: Dockerfile
    image: secflow/client:${IMAGE_TAG:-latest}
    container_name: secflow_client_shanghai
    restart: always
    depends_on:
      server:
        condition: service_healthy
    environment:
      SECFLOW_API_URL: "http://server:8080/api/v1"
      SECFLOW_WS_URL: "ws://server:8080/api/v1/ws/node"
      SECFLOW_NODE_NAME: "client-shanghai"
      SECFLOW_NODE_REGION: "上海"
      SECFLOW_TOKEN_KEY: "${NODE_TOKEN_KEY:-your-node-token-key}"
      SECFLOW_NODE_TOKEN: "${CLIENT_TOKEN_SHANGHAI:-client-shanghai-token}"
      SECFLOW_LOG_LEVEL: "${SECFLOW_LOG_LEVEL:-info}"
      SECFLOW_MAX_CONCURRENT: "3"
    volumes:
      - client_shanghai_data:/app/data
      - client_shanghai_logs:/app/logs
    networks:
      - secflow-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ─────────────────────────────────────────────
  # Client Node 3 (广州)
  # ─────────────────────────────────────────────
  client-guangzhou:
    build:
      context: ./secflow-client
      dockerfile: Dockerfile
    image: secflow/client:${IMAGE_TAG:-latest}
    container_name: secflow_client_guangzhou
    restart: always
    depends_on:
      server:
        condition: service_healthy
    environment:
      SECFLOW_API_URL: "http://server:8080/api/v1"
      SECFLOW_WS_URL: "ws://server:8080/api/v1/ws/node"
      SECFLOW_NODE_NAME: "client-guangzhou"
      SECFLOW_NODE_REGION: "广州"
      SECFLOW_TOKEN_KEY: "${NODE_TOKEN_KEY:-your-node-token-key}"
      SECFLOW_NODE_TOKEN: "${CLIENT_TOKEN_GUANGZHOU:-client-guangzhou-token}"
      SECFLOW_LOG_LEVEL: "${SECFLOW_LOG_LEVEL:-info}"
      SECFLOW_MAX_CONCURRENT: "3"
    volumes:
      - client_guangzhou_data:/app/data
      - client_guangzhou_logs:/app/logs
    networks:
      - secflow-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ─────────────────────────────────────────────
  # Data Cleaner - 数据清理服务
  # ─────────────────────────────────────────────
  cleaner:
    build:
      context: ./secflow-server
      dockerfile: Dockerfile.cleaner
    container_name: secflow_cleaner
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECFLOW_MONGO_URI: "mongodb://${MONGO_ROOT_USER:-secflow}:${MONGO_ROOT_PASS:-secflow_pass_secure_2026}@mongo:27017/${MONGO_DATABASE:-secflow}?authSource=admin"
      SECFLOW_REDIS_URL: "redis://:${REDIS_PASSWORD:-redis_pass_secure_2026}@redis:6379/0"
      SECFLOW_RETENTION_DAYS: "${DATA_RETENTION_DAYS:-90}"
      SECFLOW_ARCHIVE_ENABLED: "true"
      SECFLOW_ARCHIVE_PATH: "/archive"
      SECFLOW_CLEAN_CRON: "0 2 * * *"
    volumes:
      - archive_data:/archive
    networks:
      - secflow-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# ─────────────────────────────────────────────
# 数据卷定义
# ─────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  server_logs:
    driver: local
  server_uploads:
    driver: local
  web_cache:
    driver: local
  client_beijing_data:
    driver: local
  client_beijing_logs:
    driver: local
  client_shanghai_data:
    driver: local
  client_shanghai_logs:
    driver: local
  client_guangzhou_data:
    driver: local
  client_guangzhou_logs:
    driver: local
  archive_data:
    driver: local

# ─────────────────────────────────────────────
# 网络定义
# ─────────────────────────────────────────────
networks:
  secflow-net:
    driver: bridge
    name: secflow_prod_network
    ipam:
      config:
        - subnet: 172.28.0.0/16
