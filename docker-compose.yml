# ================================================
# SecFlow 开发环境 Docker 配置
# 使用方式: docker-compose up -d
# ================================================
services:
  # ─────────────────────────────────────────────
  # MongoDB - 主数据库
  # ─────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: secflow_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-secflow}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secflow_pass}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-secflow}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - secflow-net

  # ─────────────────────────────────────────────
  # Redis - 任务队列和缓存
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: secflow_redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass ${REDIS_PASSWORD:-secflow_redis_pass}
      - --appendonly yes
      - --maxmemory 512mb
      - --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secflow_redis_pass}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - secflow-net

  # ─────────────────────────────────────────────
  # SecFlow Server - 后端服务
  # ─────────────────────────────────────────────
  server:
    build:
      context: ./secflow-server
      dockerfile: Dockerfile
    image: secflow/server:latest
    container_name: secflow_server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # MongoDB 连接 - 使用容器网络主机名
      SECFLOW_MONGO_URI: "mongodb://${MONGO_ROOT_USER:-secflow}:${MONGO_ROOT_PASS:-secflow_pass}@mongo:27017/${MONGO_DATABASE:-secflow}?authSource=admin"
      # Redis 连接
      SECFLOW_REDIS_URL: "redis://:${REDIS_PASSWORD:-secflow_redis_pass}@redis:6379/0"
      # JWT 配置
      SECFLOW_JWT_SECRET: "${JWT_SECRET:-dev-secret-change-in-prod}"
      # 服务端口
      SECFLOW_PORT: "8989"
      # 日志级别
      SECFLOW_LOG_LEVEL: "${SECFLOW_LOG_LEVEL:-debug}"
      # 运行模式
      SECFLOW_ENV: "development"
      # Node Token 认证
      NODE_TOKEN_KEY: "${NODE_TOKEN_KEY:-secflow-node-token-key-change-me}"
    ports:
      - "${SERVER_PORT:-8989}:8989"
    volumes:
      - server_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8989/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - secflow-net

  # ─────────────────────────────────────────────
  # SecFlow Web - 前端界面
  # ─────────────────────────────────────────────
  web:
    build:
      context: ./secflow-web
      dockerfile: Dockerfile
    image: secflow/web:latest
    container_name: secflow_web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${WEB_PORT:-3000}:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - secflow-net

  # ─────────────────────────────────────────────
  # SecFlow Client - 漏洞爬取节点
  # ─────────────────────────────────────────────
  client:
    build:
      context: ./secflow-client
      dockerfile: Dockerfile
    image: secflow/client:latest
    container_name: secflow_client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      SECFLOW_API_URL: "http://server:8989/api/v1"
      SECFLOW_WS_URL: "ws://server:8989/api/v1/ws/node"
      SECFLOW_NODE_NAME: "docker-node-01"
      SECFLOW_NODE_REGION: "Docker"
      SECFLOW_TOKEN_KEY: "${NODE_TOKEN_KEY:-secflow-node-token}"
      SECFLOW_LOG_LEVEL: "info"
    volumes:
      - client_data:/app/data
      - client_logs:/app/logs
    networks:
      - secflow-net

# ─────────────────────────────────────────────
# 数据卷定义
# ─────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  server_logs:
    driver: local
  client_data:
    driver: local
  client_logs:
    driver: local

# ─────────────────────────────────────────────
# 网络定义
# ─────────────────────────────────────────────
networks:
  secflow-net:
    driver: bridge
    name: secflow_dev_network
