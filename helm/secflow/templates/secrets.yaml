# =============================================================================
# SecFlow Secrets
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "secflow.fullname" . }}
  labels:
    {{- include "secflow.labels" . | nindent 4 }}
type: Opaque
stringData:
  mongodb-uri: |
    {{- if .Values.mongodb.enabled }}
    mongodb://{{ .Values.mongodb.auth.username }}:{{ .Values.mongodb.auth.password }}@{{ .Release.Name }}-mongodb:27017/{{ .Values.mongodb.auth.database }}?authSource=admin
    {{- else }}
    {{ .Values.server.config.mongodb.uri }}
    {{- end }}
  jwt-secret: {{ .Values.server.config.jwt.secret | default (randAlphaNum 32) | b64enc | quote }}
